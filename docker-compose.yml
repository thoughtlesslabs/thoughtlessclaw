services:
  skynet-gateway:
    image: ${SKYNET_IMAGE:-skynet:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SKYNET_GATEWAY_TOKEN: ${SKYNET_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SKYNET_CONFIG_DIR}:/home/node/.skynet
      - ${SKYNET_WORKSPACE_DIR}:/home/node/.skynet/workspace
    ports:
      - "${SKYNET_GATEWAY_PORT:-18789}:18789"
      - "${SKYNET_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${SKYNET_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  skynet-cli:
    image: ${SKYNET_IMAGE:-skynet:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SKYNET_GATEWAY_TOKEN: ${SKYNET_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SKYNET_CONFIG_DIR}:/home/node/.skynet
      - ${SKYNET_WORKSPACE_DIR}:/home/node/.skynet/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]

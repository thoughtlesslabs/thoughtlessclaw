services:
  - type: web
    name: skynet
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SKYNET_STATE_DIR
        value: /data/.skynet
      - key: SKYNET_WORKSPACE_DIR
        value: /data/workspace
      - key: SKYNET_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: skynet-data
      mountPath: /data
      sizeGB: 1
